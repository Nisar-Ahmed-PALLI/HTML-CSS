<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social media profile card</title>
    <link rel="stylesheet" href="profile.css">
</head>
<body>
    <div class="profile-card">
        <img src="nisar.jpeg" class="profile-pic">
        <h2 class="name">GUDU</h2>
        <p class="handle">@gudu</p>
        <p class="bio">Web-Developer|Designer|Content Creater</p>

        <div class="stats">
            <div class="state">
                <span class="number">1.4k</span>
                <span class="label">Followers</span>
            </div>
            <div class="stat">
                <span class="number">250</span>
                <span class="label">Posts</span>
            </div>
        </div>
        <button class="follow-btn">Follow</button>

    </div>
</body>
</html>
